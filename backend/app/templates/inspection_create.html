<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создание инспекции</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            margin: 0;
            background: #f5f7fb;
            color: #1f2937;
        }
        .container {
            max-width: 680px;
            margin: 40px auto;
            padding: 24px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
        }
        form {
            display: grid;
            gap: 14px;
        }
        label {
            display: grid;
            gap: 6px;
            font-weight: 600;
        }
        input {
            height: 38px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 0 10px;
            font-size: 14px;
        }
        button {
            margin-top: 8px;
            height: 42px;
            border: 0;
            border-radius: 8px;
            background: #0f766e;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background: #115e59;
        }
        .hint {
            color: #4b5563;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Новая инспекция</h1>
        <p class="hint">Форма отправляет данные в POST /api/v1/inspections/</p>
        <form method="post" action="/api/v1/inspections/">
            <label>
                Equipment ID
                <input type="number" name="equipment_id" required min="1">
            </label>
            <label>
                Employee ID
                <input type="number" name="employee_id" required min="1">
            </label>
            <label>
                Temperature
                <input type="number" name="temperature" required step="0.01">
            </label>
            <label>
                Pressure
                <input type="number" name="pressure" required step="0.01">
            </label>
            <label>
                Vibration
                <input type="number" name="vibration" required step="0.01">
            </label>
            <label>
                Score (0-100)
                <input type="number" name="score" required min="0" max="100">
            </label>
            <label>
                Photo URL (optional)
                <input type="url" name="photo_url" placeholder="https://example.com/photo.jpg">
            </label>
            <button type="submit">Создать инспекцию</button>
        </form>
    </main>
</body>
</html>
